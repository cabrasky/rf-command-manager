add_device:
  name: Add device
  description: Add a managed RF/IR device.
  fields:
    name:
      required: true
      selector:
        text:
    connection_type:
      required: false
      default: broadlink
      selector:
        select:
          options:
            - broadlink
            - home_assistant_remote
    host:
      required: false
      selector:
        text:
    mac:
      required: false
      selector:
        text:
    remote_entity_id:
      required: false
      selector:
        entity:
          domain: remote

update_device:
  name: Update device
  description: Update managed RF/IR device attributes.
  fields:
    device_id:
      required: true
      selector:
        text:
    name:
      selector:
        text:
    connection_type:
      selector:
        text:
    host:
      selector:
        text:
    mac:
      selector:
        text:
    remote_entity_id:
      selector:
        entity:
          domain: remote

remove_device:
  name: Remove device
  description: Remove a device and all linked commands.
  fields:
    device_id:
      required: true
      selector:
        text:

add_command:
  name: Add command
  description: Add a command to a managed device.
  fields:
    device_id:
      required: true
      selector:
        text:
    name:
      required: true
      selector:
        text:
    protocol:
      required: false
      default: rf
      selector:
        text:
    payload:
      required: true
      selector:
        text:
    notes:
      required: false
      selector:
        text:

update_command:
  name: Update command
  description: Update a command label, payload, or order.
  fields:
    command_id:
      required: true
      selector:
        text:
    name:
      selector:
        text:
    protocol:
      selector:
        text:
    payload:
      selector:
        text:
    notes:
      selector:
        text:
    order:
      selector:
        number:
          min: 0
          step: 1

remove_command:
  name: Remove command
  description: Remove a single command.
  fields:
    command_id:
      required: true
      selector:
        text:

send_command:
  name: Send command
  description: Send a command to the device.
  fields:
    command_id:
      required: true
      selector:
        text:

learn_command:
  name: Learn command
  description: Learn a command and save it.
  fields:
    device_id:
      required: true
      selector:
        text:
    name:
      required: true
      selector:
        text:
    timeout:
      required: false
      default: 15
      selector:
        number:
          min: 5
          max: 120
          step: 1
    notes:
      required: false
      selector:
        text:
